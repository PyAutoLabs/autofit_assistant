# Canonical project → git URL map for the PyAutoFit stack.
#
# Every reference in this workspace (skills, wiki) that points at source code
# must resolve to one of the projects below. Inside-repo paths are relative
# to the repo root and written as `<project_name>:<relative/path>`.
#
# To add a new dependency, append a project entry with the four required
# fields. `pinned_commit` is optional; if absent, tooling treats `main` as
# the reference branch.

projects:
  - name: PyAutoNerves
    import: autonerves
    role: config           # YAML config loading, prior resolution
    git: https://github.com/PyAutoLabs/PyAutoNerves

  - name: PyAutoFit
    import: autofit
    role: modelling        # model composition, non-linear searches, samples, aggregator, graphical models
    git: https://github.com/PyAutoLabs/PyAutoFit

  - name: autofit_workspace
    import: null
    role: tutorial-scripts # existing example scripts (read-only reference)
    git: https://github.com/PyAutoLabs/autofit_workspace

  - name: HowToFit
    import: null
    role: tutorial-lectures # HowToFit lecture-series notebooks (read-only reference)
    git: https://github.com/PyAutoLabs/HowToFit

  - name: autofit_assistant
    import: null
    role: assistant        # this repo — PyAutoFit AI Assistant
    git: https://github.com/PyAutoLabs/autofit_assistant

# Dependency chain (top-to-bottom). Skills target the top; lower layers
# surface in the wiki when the user needs to understand them.
dependency_chain:
  - PyAutoNerves
  - PyAutoFit
